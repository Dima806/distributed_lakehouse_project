name: Benchmark

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Number of event rows to generate"
        required: false
        default: "5000000"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate data
        run: uv run python -m src.utils.data_gen --rows ${{ github.event.inputs.rows }}

      - name: Run Spark jobs
        run: make run-spark
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Run Ray jobs
        run: make run-ray
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Run benchmark
        run: make benchmark
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: data/benchmark_results.json
