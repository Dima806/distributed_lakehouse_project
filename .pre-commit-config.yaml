repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        language: system
        entry: uv run ruff check src tests
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format check
        language: system
        entry: uv run ruff format --check src tests
        pass_filenames: false
        stages: [pre-commit]
